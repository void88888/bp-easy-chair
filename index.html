<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyChair v2 - BP Deliberation ✨</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💺</text></svg>">
</head>
<body class="light-mode">
    <div class="stars"></div>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    
    <div class="container">
        <header>
            <h1>💺 EasyChair v2</h1>
            <p>BP Deliberation Assistant - Neon Edition ✨</p>
        </header>

        <div class="main-content">
            <!-- Judges Panel -->
            <div class="panel judges-panel">
                <h2>👨‍⚖️ Judges' Calls</h2>
                <div class="judge-inputs">
                    <div class="judge-row" id="judge1">
                        <label>Judge 1:</label>
                        <select class="call-select">
                            <option value="">Select call...</option>
                            <option value="OG>OO>CG>CO">OG>OO>CG>CO</option>
                            <option value="OG>CG>OO>CO">OG>CG>OO>CO</option>
                            <option value="OO>OG>CG>CO">OO>OG>CG>CO</option>
                            <option value="OO>OG>CO>CG">OO>OG>CO>CG</option>
                            <option value="CG>OG>OO>CO">CG>OG>OO>CO</option>
                            <option value="CG>OO>OG>CO">CG>OO>OG>CO</option>
                            <option value="CO>CG>OO>OG">CO>CG>OO>OG</option>
                            <option value="CO>OO>CG>OG">CO>OO>CG>OG</option>
                        </select>
                    </div>
                    <div class="judge-row" id="judge2">
                        <label>Judge 2:</label>
                        <select class="call-select">
                            <option value="">Select call...</option>
                            <option value="OG>OO>CG>CO">OG>OO>CG>CO</option>
                            <option value="OG>CG>OO>CO">OG>CG>OO>CO</option>
                            <option value="OO>OG>CG>CO">OO>OG>CG>CO</option>
                            <option value="OO>OG>CO>CG">OO>OG>CO>CG</option>
                            <option value="CG>OG>OO>CO">CG>OG>OO>CO</option>
                            <option value="CG>OO>OG>CO">CG>OO>OG>CO</option>
                            <option value="CO>CG>OO>OG">CO>CG>OO>OG</option>
                            <option value="CO>OO>CG>OG">CO>OO>CG>OG</option>
                        </select>
                    </div>
                    <div class="judge-row" id="judge3">
                        <label>Judge 3:</label>
                        <select class="call-select">
                            <option value="">Select call...</option>
                            <option value="OG>OO>CG>CO">OG>OO>CG>CO</option>
                            <option value="OG>CG>OO>CO">OG>CG>OO>CO</option>
                            <option value="OO>OG>CG>CO">OO>OG>CG>CO</option>
                            <option value="OO>OG>CO>CG">OO>OG>CO>CG</option>
                            <option value="CG>OG>OO>CO">CG>OG>OO>CO</option>
                            <option value="CG>OO>OG>CO">CG>OO>OG>CO</option>
                            <option value="CO>CG>OO>OG">CO>CG>OO>OG</option>
                            <option value="CO>OO>CG>OG">CO>OO>CG>OG</option>
                        </select>
                    </div>
                </div>
                <button class="btn-add-judge" onclick="addJudge()">+ Add Judge</button>
            </div>

            <!-- Exchanges Panel -->
            <div class="panel exchanges-panel">
                <h2>🔄 Exchanges (1-7)</h2>
                <div class="exchange-grid" id="exchangeGrid"></div>
            </div>

            <!-- Recommendations Panel -->
            <div class="panel recommendations-panel">
                <h2>🥇 Recommended Order</h2>
                <div id="recommendations">
                    <p>Enter judges' calls and mark exchanges to see recommendations!</p>
                </div>
            </div>

            <!-- Final Call Panel -->
            <div class="panel final-call-panel">
                <h2>🎯 Final Call</h2>
                <div id="finalCall">
                    <p>Resolve all dissenting exchanges to see consensus call</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-neon btn-primary" onclick="calculateRecommendations()">⚡ Calculate</button>
            <button class="btn-neon btn-secondary" onclick="resetAll()">🔄 Reset All</button>
            <button class="btn-neon btn-export" onclick="exportData()">📤 Export</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
